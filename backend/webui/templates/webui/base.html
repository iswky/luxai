<!-- webui/templates/webui/base.html -->

{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TenderFlow AI{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{% static 'webui/css/style.css' %}">
</head>

<body>
    <div class="page-glow page-glow-left"></div>
    <div class="page-glow page-glow-right"></div>

    <nav class="topbar">
        <div class="container topbar-inner">
            <a class="brand" href="/">
                <span class="brand-icon">◆</span>
                <span>TenderFlow</span>
                <span class="brand-ai">AI</span>
            </a>

            <div class="nav-menu">
                <a class="nav-item" href="/">Главная</a>
                <a class="nav-item" href="/files/">Файлы</a>
                <a class="nav-item" href="/equipment/">Сравнение</a>
                <a class="nav-item" href="/applications/">Разбор заявок</a>
            </div>
        </div>
    </nav>

    <main class="container app-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
